server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # SPA fallback (single-page app: serve index.html for unknown routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media & fonts — cache a month. nginx serves byte-range requests by
    # default (needed for video seeking in the <video> player).
    location ~* \.(?:mp4|webm|jpg|jpeg|png|webp|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Never cache the HTML shell so deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
